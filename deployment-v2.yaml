apiVersion: apps/v1
kind: Deployment
metadata:
  name: notif-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notif-v2
  template:
    metadata:
      labels:
        app: notif-v2
    spec:
      containers:
      - name: notif
        image: YOUR_USERNAME/notification-app:v2
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notif-service-v2
spec:
  type: NodePort
  selector:
    app: notif-v2
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30002
