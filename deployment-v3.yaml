apiVersion: apps/v1
kind: Deployment
metadata:
  name: notif-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notif-v3
  template:
    metadata:
      labels:
        app: notif-v3
    spec:
      containers:
      - name: notif
        image: YOUR_USERNAME/notification-app:v3
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notif-service-v3
spec:
  type: NodePort
  selector:
    app: notif-v3
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30003
